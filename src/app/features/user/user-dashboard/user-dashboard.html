<div class="dashboard-shell">
  <div class="welcome-banner">
    <div class="banner-content">
      <h1>Welcome back, Requester! 👋</h1>
      <p>Here's an overview of your assigned assets and pending requests.</p>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <mat-icon>inventory_2</mat-icon>
      <div class="stat-info">
        <h3>My Assets</h3>
        <p>0 Assigned</p>
      </div>
    </div>
    <div class="stat-card accent">
      <mat-icon>history</mat-icon>
      <div class="stat-info">
        <h3>Requests</h3>
        <p>0 Pending</p>
      </div>
    </div>
  </div>

  <div class="content-section">
    <div class="empty-assets">
      <mat-icon>devices_other</mat-icon>
      <h3>No Assets Found</h3>
      <p>You don't have any equipment assigned to you at the moment.</p>
      <button class="request-btn">Request an Asset</button>
    </div>
  </div>
</div>
