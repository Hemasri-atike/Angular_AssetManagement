<div class="password-dialog">
  <div class="dialog-header">
    <h2>Change Password</h2>
    <p>Update your account security credentials.</p>
  </div>

  <div class="dialog-content">
    <!-- Current Password -->
    <div class="form-group">
      <label>Current Password</label>
      <div class="input-wrapper">
        <mat-icon class="field-icon">lock</mat-icon>
        <input [type]="showPasswords.current ? 'text' : 'password'" 
               [(ngModel)]="passwords.current" 
               placeholder="Enter current password">
        <button type="button" class="eye-btn" (click)="toggleVisibility('current')">
          <mat-icon>{{ showPasswords.current ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>
    </div>

    <!-- New Password -->
    <div class="form-group">
      <label>New Password</label>
      <div class="input-wrapper">
        <mat-icon class="field-icon">key</mat-icon>
        <input [type]="showPasswords.new ? 'text' : 'password'" 
               [(ngModel)]="passwords.new" 
               placeholder="Enter new password">
        <button type="button" class="eye-btn" (click)="toggleVisibility('new')">
          <mat-icon>{{ showPasswords.new ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>
    </div>

    <!-- Confirm Password -->
    <div class="form-group">
      <label>Confirm New Password</label>
      <div class="input-wrapper">
        <mat-icon class="field-icon">history</mat-icon>
        <input [type]="showPasswords.confirm ? 'text' : 'password'" 
               [(ngModel)]="passwords.confirm" 
               placeholder="Confirm new password">
        <button type="button" class="eye-btn" (click)="toggleVisibility('confirm')">
          <mat-icon>{{ showPasswords.confirm ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>
    </div>

    <!-- Security Warning -->
    <div class="security-note">
      <mat-icon>info</mat-icon>
      <p>Password must be at least 8 characters long and include numbers.</p>
    </div>
  </div>

  <div class="dialog-actions">
    <button class="cancel-btn" (click)="onClose()">Cancel</button>
    <button class="save-btn" (click)="onSave()" [disabled]="!passwords.new || passwords.new !== passwords.confirm">
      Update Password
    </button>
  </div>
</div>
