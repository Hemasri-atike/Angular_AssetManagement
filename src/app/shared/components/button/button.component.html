<button [type]="type"
        [disabled]="disabled"
        (click)="onClick()"
        [ngClass]="['btn-shared', 'variant-' + variant, class]"
        [class.disabled]="disabled">
  <mat-icon *ngIf="icon" class="btn-icon">{{ icon }}</mat-icon>
  <span class="btn-label">{{ label }}</span>
</button>
