<div class="control-section">
    <span id='msg'></span>
    <ejs-grid #overviewgrid id='overviewgrid' [dataSource]='data' rowHeight='38' 
              [allowSelection]='true' [loadingIndicator]='loadingIndicator' height='400' 
              (dataBound)='onDataBound($event)' [enableHover]='true' 
              [selectionSettings]='selectionSettings' [filterSettings]='filterSettings' 
              [allowSorting]='true' [allowFiltering]='true'>
        <e-columns>
            <e-column type='checkbox' [allowFiltering]='false' [allowSorting]='false' width='60'></e-column>
            <e-column field='EmployeeID' [visible]='false' headerText='Employee ID' width='130' [isPrimaryKey]='true'></e-column>
            <e-column field='Employees' headerText='Employee Name' clipMode='EllipsisWithTooltip' width='200'>
                <ng-template #template let-data>
                    <div class="emp-cell">
                        <div class="empimg">
                            <span *ngIf="data.EmployeeImg === 'usermale'" class="e-userimg male-icon">👤</span>
                            <span *ngIf="data.EmployeeImg === 'userfemale'" class="e-userimg female-icon">👩</span>
                        </div>
                        <span class="emp-name">{{data.Employees}}</span>
                    </div>
                </ng-template>
            </e-column>
            <e-column field='Designation' headerText='Designation' clipMode='EllipsisWithTooltip' width='170'></e-column>
            <e-column field='Mail' headerText='Mail' width='230'></e-column>
            <e-column field='Location' headerText='Location' width='140'>
                <ng-template #template let-data>
                    <div class="loc">
                        <span class="loc-icon">📍</span>
                        <span>{{data.Location}}</span>
                    </div>
                </ng-template>
            </e-column>
            <e-column field='Status' headerText='Status' width='150'>
                <ng-template #template let-data>
                    <div *ngIf="data.Status === 'Active'; else inactive" class="statustemp e-activecolor">
                        <span class="statustxt e-activecolor">{{data.Status}}</span>
                    </div>
                    <ng-template #inactive>
                        <div class="statustemp e-inactivecolor">
                            <span class="statustxt e-inactivecolor">{{data.Status}}</span>
                        </div>
                    </ng-template>
                </ng-template>
            </e-column>
            <e-column field='Trustworthiness' headerText='Trustworthiness' width='200'>
                <ng-template #template let-data>
                    <div class="trust">
                        <span *ngIf="data.Trustworthiness === 'Perfect'" class="trust-icon perfect">🟢</span>
                        <span *ngIf="data.Trustworthiness === 'Sufficient'" class="trust-icon sufficient">🔵</span>
                        <span *ngIf="data.Trustworthiness === 'Insufficient'" class="trust-icon insufficient">🔴</span>
                        <span class="trust-text">{{data.Trustworthiness}}</span>
                    </div>
                </ng-template>
            </e-column>
            <e-column field='Rating' [allowFiltering]='false' headerText='Rating' width='160'>
                <ng-template #template let-data>
                    <div class="rate">
                        <div class="rating">
                            <input ejs-rating [readOnly]="true" value={{data.Rating}} cssClass='custom-rating'/>
                        </div>
                    </div>
                </ng-template>
            </e-column>
            <e-column field='Software' headerText='Software' [allowSorting]='false' [allowFiltering]='false' width='180'>
                <ng-template #template let-data>
                    <div class="pbar">
                        <div *ngIf="data.Status === 'Inactive'" [style.width.%]='softwareValue(data.Software)' class="bar progressdisable">
                            <div class="barlabel">{{softwareValue(data.Software)}}%</div>
                        </div>
                        <div *ngIf="data.Status === 'Active'" [style.width.%]='softwareValue(data.Software)' class="bar">
                            <div class="barlabel">{{softwareValue(data.Software)}}%</div>
                        </div>
                    </div>
                </ng-template>
            </e-column>
            <e-column field='CurrentSalary' headerText='Current Salary' format='C2' width='160'></e-column>
            <e-column field='Address' headerText='Address' clipMode='EllipsisWithTooltip' width='240'></e-column>
        </e-columns>
    </ejs-grid>
</div>
